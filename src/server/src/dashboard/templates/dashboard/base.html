{% load django_vite %}
{% load django_htmx %}
<!DOCTYPE html>
<html lang="en">
      <head>
            <title>Dispatcher | Royal Waygon</title>
            <meta charset="UTF-8">
            <meta name="viewport"
                  content="width=device-width, initial-scale=1.0">
            <meta http-equiv="X-UA-Compatible"
                  content="ie=edge">
            <meta name="description"
                  content="A Django project using Tailwind CSS.">
            <meta name="keywords"
                  content="Django, Tailwind, CSS, Python, Web Development">
            <style>
                /* Lock the document to the viewport so only the inner content
                   section scrolls — prevents the whole-window rubber-band on
                   macOS Chrome/Safari that stretches the in-flow <header> while
                   the position:fixed <nav> stays pinned, desyncing the two. */
                html,
                body {
                    height: 100%;
                    overflow: hidden;
                    overscroll-behavior: none;
                }

                /* Loader base layout */
                #page-loader {
                    position: fixed;
                    inset: 0;
                    z-index: 9999;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    transition: opacity 0.4s, background-color 0.3s, color 0.3s;
                    /* Fallback (will be immediately overridden by media queries in supporting browsers) */
                    background: #2a303c;
                    color: #d1d5db;
                }

                /* Spinner element inside loader (rotating color variant) */
                .loader {
                    --c: no-repeat linear-gradient(orange 0 0);
                    background: var(--c), var(--c), var(--c), var(--c), var(--c), var(--c),
                        var(--c), var(--c), var(--c);
                    background-size: 16px 16px;
                    animation: l32-1 1s infinite, l32-2 1s infinite;
                }

                @keyframes l32-1 {

                    0%,
                    100% {
                        width: 45px;
                        height: 45px;
                    }

                    35%,
                    65% {
                        width: 65px;
                        height: 65px;
                    }
                }

                @keyframes l32-2 {

                    0%,
                    40% {
                        background-position: 0 0, 0 50%, 0 100%, 50% 100%, 100% 100%, 100% 50%,
                            100% 0, 50% 0, 50% 50%;
                    }

                    60%,
                    100% {
                        background-position: 0 50%, 0 100%, 50% 100%, 100% 100%, 100% 50%,
                            100% 0, 50% 0, 0 0, 50% 50%;
                    }
                }

                /* Light mode (system preference) */
                @media (prefers-color-scheme: light) {
                    #page-loader {
                        background: #f3f4f6;
                        /* light gray */
                        color: #374151;
                        /* slate-700 */
                    }
                }

                /* Dark mode (system preference) */
                @media (prefers-color-scheme: dark) {
                    #page-loader {
                        background: #1f2733;
                        /* deep slate */
                        color: #d1d5db;
                        /* light gray */
                    }
                }

                /* High contrast / forced colors (optional accessibility tweak) */
                @media (forced-colors: active) {
                    #page-loader {
                        background: Canvas;
                        color: CanvasText;
                    }
                }
            </style>
            <script>
                window.addEventListener("DOMContentLoaded", function() {
                    var loader = document.getElementById("page-loader");
                    if (loader) {
                        setTimeout(function() {
                            loader.style.opacity = "0";
                            setTimeout(function() {
                                loader.style.display = "none";
                            }, 300);
                        }, 600); // Show loader for at least 1 second
                    }
                });
            </script>
            {% vite_hmr_client %}
            {% vite_asset 'assets/js/main.js' %}
            {% htmx_script %}
      </head>
      <body hx-headers='{"x-csrftoken": "{{ csrf_token }}"}'
            class="font-sans">
            <div id="page-loader">
                  <div class="loader"
                       role="status"
                       aria-label="Loading">
                  </div>
            </div>
            <c-navbar title="Dispatch Center" content_id="content">
                  <c-slot name="breadcrumbs">
                        <ul>
                              <li>
                                    <a>
                                          <svg xmlns="http://www.w3.org/2000/svg"
                                               fill="none"
                                               viewBox="0 0 24 24"
                                               class="h-4 w-4 stroke-current">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z">
                                                </path>
                                          </svg>
                                          Trips
                                    </a>
                              </li>
                              <li>
                                    <a>
                                          <svg xmlns="http://www.w3.org/2000/svg"
                                               fill="none"
                                               viewBox="0 0 24 24"
                                               class="h-4 w-4 stroke-current">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z">
                                                </path>
                                          </svg>
                                          All Trips
                                    </a>
                              </li>
                        </ul>
                  </c-slot>
                  {% block content %}
                  {% endblock content %}
            </c-navbar>
            <c-right-drawer />
      </body>
</html>
